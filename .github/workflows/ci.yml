name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU-only dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pytest numpy faiss-cpu sentence-transformers

      - name: Lint with ruff
        run: ruff check src/ tests/ --select E,W,F --ignore E501

      - name: Compile protobuf stubs
        run: |
          pip install grpcio-tools
          mkdir -p generated
          python -m grpc_tools.protoc \
            -I proto \
            --python_out=generated \
            --grpc_python_out=generated \
            proto/search.proto

      - name: Run CPU-only tests
        run: pytest tests/ -v --tb=short
